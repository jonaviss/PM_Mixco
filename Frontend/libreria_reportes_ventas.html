<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes de Ventas | PM Mixco ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#755b00",
                        "primary-container": "#C9A227",
                        "on-primary": "#ffffff",
                        "surface": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#F1F5F9",
                        "surface-container": "#E2E8F0",
                        "surface-container-high": "#CBD5E1",
                        "outline-variant": "#CBD5E1",
                        "outline": "#94A3B8",
                        "on-surface": "#1E293B",
                        "on-surface-variant": "#475569",
                        "secondary": "#64748B",
                        "error": "#EF4444"
                    },
                    fontFamily: { "sora": ["Sora"], "mono": ["JetBrains Mono"] },
                    spacing: { "sidebar": "260px" }
                }
            }
        }
    </script>
    <style>
        .progress-bar {
            transition: width 0.3s ease;
        }
        .progress-text {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="text-on-surface">

<div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<div id="main-content" class="md:ml-sidebar min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 bg-surface-container-lowest border-b border-outline-variant h-16 flex items-center justify-between px-6 shadow-sm">
        <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-surface-container text-secondary"><span class="material-symbols-outlined">menu</span></button>
        <h2 class="text-base font-bold text-on-surface leading-none">Reportes de Ventas</h2>
        <div class="flex items-center gap-2 pl-3 border-l border-outline-variant">
            <div class="text-right hidden sm:block"><p id="nombre-usuario" class="text-sm font-bold text-on-surface"></p><p id="rango-usuario" class="text-xs text-secondary mt-0.5 capitalize"></p></div>
            <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-white font-bold text-sm"><span id="avatar-inicial">?</span></div>
        </div>
    </header>

    <main class="flex-1 p-6 space-y-5">

        <!-- Filtros -->
        <div class="bg-white border border-outline-variant rounded-xl p-5 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Período</label>
                    <select id="periodo-select" class="w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="hoy">Hoy</option>
                        <option value="ayer">Ayer</option>
                        <option value="semana">Esta semana</option>
                        <option value="mes">Este mes</option>
                        <option value="personalizado">Personalizado</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Vendedor</label>
                    <select id="operador-select" class="w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Estado</label>
                    <select id="estado-select" class="w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">Todos</option>
                        <option value="pagado">Pagado</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="parcial">Parcial</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div id="fecha-inicio-container" class="hidden">
                    <label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Fecha Inicio</label>
                    <input type="date" id="fecha-inicio" class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div id="fecha-fin-container" class="hidden">
                    <label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Fecha Fin</label>
                    <input type="date" id="fecha-fin" class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="flex justify-end mt-4 gap-3">
                <button onclick="exportarCSV()" class="border border-primary-container text-primary-container font-bold px-4 py-2 rounded-lg hover:bg-primary-container hover:text-white transition text-sm flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">download</span> Exportar CSV
                </button>
                <button onclick="cargarReporte()" class="bg-primary-container text-white font-bold px-6 py-2 rounded-lg hover:opacity-90 transition text-sm flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">bar_chart</span> Generar Reporte
                </button>
            </div>
        </div>

        <!-- Tarjetas de resumen -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="tarjetas-resumen">
            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-secondary uppercase tracking-wider">Cantidad Transacciones</p>
                <p id="total-transacciones" class="text-2xl font-bold text-on-surface font-mono mt-1">0</p>
            </div>
            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-secondary uppercase tracking-wider">Productos Vendidos</p>
                <p id="total-productos" class="text-2xl font-bold text-on-surface font-mono mt-1">0</p>
            </div>
            <div class="bg-white border border-outline-variant rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-secondary uppercase tracking-wider">Total Ventas</p>
                <p id="total-ventas" class="text-2xl font-bold text-on-surface font-mono mt-1">Q0.00</p>
            </div>
        </div>

        <!-- Barra de progreso -->
        <div id="progress-container" class="hidden bg-white border border-outline-variant rounded-xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-1">
                <span class="text-xs font-mono font-bold text-secondary uppercase tracking-wider">Generando reporte...</span>
                <span id="progress-text" class="text-xs font-mono font-bold text-primary progress-text">0%</span>
            </div>
            <div class="w-full bg-surface-container-high rounded-full h-2.5">
                <div id="progress-bar" class="bg-primary-container h-2.5 rounded-full progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Tabla de resultados (SIEMPRE ventas individuales) -->
        <div class="bg-white border border-outline-variant rounded-xl overflow-hidden shadow-sm">
            <div class="px-5 py-4 border-b border-outline-variant bg-surface-container-low/30 flex justify-between items-center">
                <h3 class="text-sm font-bold text-on-surface">Ventas</h3>
                <span id="rango-fechas-label" class="text-xs font-mono text-secondary"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low/50">
                        <tr>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider">Fecha</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider">Hora</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider">Cliente</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-right">Total</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-center">Estado</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-center">Detalles</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reporte" class="divide-y divide-outline-variant text-sm">
                        <tr><td colspan="6" class="text-center py-10 text-secondary">Seleccione un período y genere el reporte.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <footer class="border-t border-outline-variant px-6 py-3 text-center">
        <p class="text-xs font-mono text-outline">PM Mixco ERP v2.0.0 &mdash; Módulo Librería &copy; 2026</p>
    </footer>
</div>

<!-- MODAL: Recibo -->
<div id="modal-recibo" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="bg-primary px-5 py-4 flex justify-between items-center flex-shrink-0">
            <div>
                <h3 class="text-base font-bold text-white">Detalle del Recibo</h3>
                <p id="modal-recibo-id" class="text-xs text-white/70 mt-0.5">Venta: —</p>
            </div>
            <button onclick="cerrarModalRecibo()" class="text-white/70 hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="overflow-y-auto flex-1 p-5 space-y-4">
            <div id="recibo-contenido">
                <div class="text-center py-10 text-secondary">Cargando...</div>
            </div>
        </div>
        <div class="px-5 py-3 border-t border-outline-variant bg-surface-container-low/30 flex justify-between items-center flex-shrink-0">
            <div class="flex gap-2">
                <button onclick="descargarPDFRecibo()" class="px-4 py-2 text-sm font-bold bg-primary-container text-white rounded-lg hover:opacity-90 transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">download</span> Descargar PDF
                </button>
                <button onclick="reenviarCorreoRecibo()" class="px-4 py-2 text-sm font-bold border border-primary-container text-primary-container rounded-lg hover:bg-primary-container hover:text-white transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[18px]">send</span> Enviar por correo
                </button>
            </div>
            <button onclick="cerrarModalRecibo()" class="px-4 py-2 text-sm font-bold text-secondary hover:bg-surface-container rounded-lg transition">Cerrar</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/notify.js"></script>
<script src="js/layout.js"></script>
<script>
// ======================== VARIABLES GLOBALES ========================
let ventasLista = [];
let ventaActual = null;
let progressInterval = null;

// ======================== FUNCIONES AUXILIARES ========================
function formatearMoneda(valor) {
    return 'Q' + parseFloat(valor || 0).toLocaleString('es-GT', { minimumFractionDigits: 2 });
}

function formatearFecha(fechaISO) {
    if (!fechaISO) return '—';
    const fecha = new Date(fechaISO + 'T00:00:00');
    return fecha.toLocaleDateString('es-GT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatearFechaHora(fechaISO) {
    if (!fechaISO) return '—';
    const fecha = new Date(fechaISO);
    return fecha.toLocaleString('es-GT', {
        timeZone: 'America/Guatemala',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function mostrarUsuario() {
    const nombre = localStorage.getItem('usuario') || 'Usuario';
    const rango = localStorage.getItem('rango') || '';
    document.getElementById('nombre-usuario').textContent = nombre;
    document.getElementById('rango-usuario').textContent = rango;
    document.getElementById('avatar-inicial').textContent = nombre.charAt(0).toUpperCase();
}

// ======================== BARRA DE PROGRESO ========================
function mostrarProgreso() {
    const container = document.getElementById('progress-container');
    const bar = document.getElementById('progress-bar');
    const text = document.getElementById('progress-text');
    container.classList.remove('hidden');
    let progreso = 0;

    if (progressInterval) clearInterval(progressInterval);

    progressInterval = setInterval(() => {
        if (progreso < 95) {
            progreso += Math.floor(Math.random() * 5) + 1;
            if (progreso > 95) progreso = 95;
            bar.style.width = progreso + '%';
            text.textContent = progreso + '%';
        }
    }, 300);
}

function ocultarProgreso() {
    const container = document.getElementById('progress-container');
    const bar = document.getElementById('progress-bar');
    const text = document.getElementById('progress-text');

    if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
    }

    bar.style.width = '100%';
    text.textContent = '100%';

    setTimeout(() => {
        container.classList.add('hidden');
        bar.style.width = '0%';
        text.textContent = '0%';
    }, 600);
}

// ======================== CONFIGURAR FILTROS ========================
function configurarFiltros() {
    const periodoSelect = document.getElementById('periodo-select');
    const fechaInicioContainer = document.getElementById('fecha-inicio-container');
    const fechaFinContainer = document.getElementById('fecha-fin-container');

    periodoSelect.addEventListener('change', function() {
        const esPersonalizado = this.value === 'personalizado';
        fechaInicioContainer.classList.toggle('hidden', !esPersonalizado);
        fechaFinContainer.classList.toggle('hidden', !esPersonalizado);
        if (esPersonalizado) {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha-inicio').value = hoy;
            document.getElementById('fecha-fin').value = hoy;
        }
    });

    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fecha-inicio').value = hoy;
    document.getElementById('fecha-fin').value = hoy;
}

function obtenerRangoFechas() {
    const periodo = document.getElementById('periodo-select').value;
    const hoy = new Date();
    let inicio = new Date(hoy);
    let fin = new Date(hoy);

    switch (periodo) {
        case 'hoy':
            inicio.setHours(0, 0, 0, 0);
            fin.setHours(23, 59, 59, 999);
            break;
        case 'ayer':
            inicio.setDate(hoy.getDate() - 1);
            inicio.setHours(0, 0, 0, 0);
            fin.setDate(hoy.getDate() - 1);
            fin.setHours(23, 59, 59, 999);
            break;
        case 'semana':
            const diaSemana = hoy.getDay();
            const diff = diaSemana === 0 ? 6 : diaSemana - 1;
            inicio.setDate(hoy.getDate() - diff);
            inicio.setHours(0, 0, 0, 0);
            fin.setHours(23, 59, 59, 999);
            break;
        case 'mes':
            inicio.setDate(1);
            inicio.setHours(0, 0, 0, 0);
            fin.setHours(23, 59, 59, 999);
            break;
        case 'personalizado':
            inicio = new Date(document.getElementById('fecha-inicio').value + 'T00:00:00');
            fin = new Date(document.getElementById('fecha-fin').value + 'T23:59:59');
            break;
        default:
            inicio.setHours(0, 0, 0, 0);
            fin.setHours(23, 59, 59, 999);
    }

    return {
        inicio: inicio.toISOString(),
        fin: fin.toISOString()
    };
}

// ======================== CARGAR VENDEDORES ========================
async function cargarVendedores() {
    try {
        const res = await API.get('/libreria/usuarios/vendedores', true);
        if (res.ok) {
            const vendedores = await res.json();
            const select = document.getElementById('operador-select');
            vendedores.forEach(v => {
                const option = document.createElement('option');
                option.value = v.cui;
                option.textContent = v.nombre_completo;
                select.appendChild(option);
            });
        }
    } catch (err) {
        console.error('[Reportes] Error al cargar vendedores:', err);
    }
}

// ======================== CARGAR REPORTE ========================
async function cargarReporte() {
    const rango = obtenerRangoFechas();
    const operador = document.getElementById('operador-select').value;
    const estado = document.getElementById('estado-select').value;

    let url = `/libreria/ventas/reporte?inicio=${encodeURIComponent(rango.inicio)}&fin=${encodeURIComponent(rango.fin)}`;
    if (operador) url += `&operador_cui=${operador}`;
    if (estado) url += `&estado=${estado}`;

    document.getElementById('tabla-reporte').innerHTML = '<tr><td colspan="6" class="text-center py-10 text-secondary">Cargando...</td></tr>';

    mostrarProgreso();

    try {
        const res = await API.get(url, true);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        // Aplanar todas las ventas de todos los días en una sola lista
        ventasLista = [];
        (data.dias || []).forEach(dia => {
            const ventasDelDia = (data.detalle || {})[dia.fecha] || [];
            ventasDelDia.forEach(v => {
                ventasLista.push({
                    ...v,
                    fecha: dia.fecha
                });
            });
        });

        renderizarTabla();
        actualizarResumen(data.resumen || {});
        document.getElementById('rango-fechas-label').textContent =
            `${formatearFecha(rango.inicio)} - ${formatearFecha(rango.fin)}`;

        ocultarProgreso();

    } catch (err) {
        console.error('[Reporte] Error:', err);
        notify.error('Error al cargar el reporte');
        document.getElementById('tabla-reporte').innerHTML = '<tr><td colspan="6" class="text-center py-10 text-error">Error al cargar el reporte.</td></tr>';
        ocultarProgreso();
    }
}

// ======================== RENDERIZAR TABLA (SIEMPRE INDIVIDUAL) ========================
function renderizarTabla() {
    const tbody = document.getElementById('tabla-reporte');

    if (ventasLista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-secondary">No hay ventas en este período.</td></tr>';
        return;
    }

    tbody.innerHTML = '';
    ventasLista.forEach(v => {
        const badge = v.estado === 'pagado' ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700">Pagado</span>' :
                     v.estado === 'parcial' ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">Parcial</span>' :
                     '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Pendiente</span>';
        const tr = document.createElement('tr');
        tr.className = 'table-row transition-colors cursor-pointer hover:bg-surface-container-low';
        tr.innerHTML = `
            <td class="px-5 py-3">${formatearFecha(v.fecha)}</td>
            <td class="px-5 py-3">${formatearFechaHora(v.created_at)}</td>
            <td class="px-5 py-3">${v.cliente || '—'}</td>
            <td class="px-5 py-3 text-right font-mono font-bold">${formatearMoneda(v.total)}</td>
            <td class="px-5 py-3 text-center">${badge}</td>
            <td class="px-5 py-3 text-center">
                <button onclick="verRecibo('${v.id}')" class="p-1.5 rounded-lg border border-outline-variant text-primary hover:bg-primary-container hover:text-white transition" title="Ver recibo">
                    <span class="material-symbols-outlined text-[16px]">receipt_long</span>
                </button>
            </td>
        `;
        // Al hacer clic en la fila (excepto en el botón) abrir el recibo
        tr.addEventListener('click', function(e) {
            if (!e.target.closest('button')) {
                verRecibo(v.id);
            }
        });
        tbody.appendChild(tr);
    });
}

function actualizarResumen(resumen) {
    document.getElementById('total-ventas').textContent = formatearMoneda(resumen.total_ventas || 0);
    document.getElementById('total-transacciones').textContent = resumen.total_transacciones || 0;
    document.getElementById('total-productos').textContent = resumen.total_productos || 0;
}

// ======================== MODAL RECIBO ========================
async function verRecibo(ventaId) {
    ventaActual = ventaId;
    document.getElementById('modal-recibo-id').textContent = `Venta: ${ventaId.substring(0,8)}...`;
    document.getElementById('recibo-contenido').innerHTML = '<div class="text-center py-10 text-secondary">Cargando detalle...</div>';
    document.getElementById('modal-recibo').classList.remove('hidden');
    document.getElementById('modal-recibo').classList.add('flex');

    try {
        const res = await API.get(`/libreria/ventas/${ventaId}/detalle`, true);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderizarRecibo(data);
    } catch (err) {
        console.error('[Recibo] Error:', err);
        document.getElementById('recibo-contenido').innerHTML = `<div class="text-center py-10 text-error">Error al cargar el recibo.</div>`;
        notify.error('Error al cargar el detalle');
    }
}

function renderizarRecibo(data) {
    const venta = data.venta;
    const productos = data.productos || [];
    const pagos = data.pagos || [];

    let html = `
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-xs font-mono text-gray-500">Total Venta</p>
                <p class="text-lg font-bold font-mono">${formatearMoneda(venta.total_venta)}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-xs font-mono text-gray-500">Total Pagado</p>
                <p class="text-lg font-bold font-mono">${formatearMoneda(venta.total_pagado)}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-xs font-mono text-gray-500">Estado</p>
                <p class="text-lg font-bold ${venta.estado_pago === 'pagado' ? 'text-green-600' : 'text-red-600'}">${venta.estado_pago.toUpperCase()}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-xs font-mono text-gray-500">Operador</p>
                <p class="text-lg font-bold">${venta.operador || '—'}</p>
            </div>
        </div>
        <div class="mb-4">
            <p class="text-xs font-mono text-gray-500">Cliente</p>
            <p class="font-bold">${venta.comprador_cui}</p>
        </div>
        <div class="mb-4">
            <h4 class="text-xs font-mono font-bold text-gray-500 uppercase tracking-wider mb-2">Productos</h4>
            <div class="border border-gray-200 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase">Producto</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-center">Cant.</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Precio Unit.</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
    `;
    if (productos.length === 0) {
        html += `<tr><td colspan="4" class="text-center py-4 text-gray-500">Sin productos.</td></tr>`;
    } else {
        productos.forEach(p => {
            html += `
                <tr>
                    <td class="px-4 py-2.5">${p.nombre}</td>
                    <td class="px-4 py-2.5 text-center">${p.cantidad}</td>
                    <td class="px-4 py-2.5 text-right font-mono">${formatearMoneda(p.precio_unitario)}</td>
                    <td class="px-4 py-2.5 text-right font-mono font-bold">${formatearMoneda(p.subtotal)}</td>
                </tr>
            `;
        });
    }
    html += `
                    </tbody>
                </table>
            </div>
        </div>
    `;

    if (pagos.length > 0) {
        html += `
            <div>
                <h4 class="text-xs font-mono font-bold text-gray-500 uppercase tracking-wider mb-2">Pagos</h4>
                <div class="border border-gray-200 rounded-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase">Fecha</th>
                                <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Monto</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
        `;
        pagos.forEach(p => {
            html += `
                <tr>
                    <td class="px-4 py-2.5">${formatearFechaHora(p.fecha_pago)}</td>
                    <td class="px-4 py-2.5 text-right font-mono font-bold text-green-700">${formatearMoneda(p.monto_abonado)}</td>
                </tr>
            `;
        });
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    document.getElementById('recibo-contenido').innerHTML = html;
}

function cerrarModalRecibo() {
    document.getElementById('modal-recibo').classList.add('hidden');
    document.getElementById('modal-recibo').classList.remove('flex');
    ventaActual = null;
}

// ======================== DESCARGAR PDF Y ENVIAR CORREO ========================
async function descargarPDFRecibo() {
    if (!ventaActual) {
        notify.warning('No hay recibo seleccionado');
        return;
    }
    try {
        const res = await API.get(`/libreria/ventas/${ventaActual}/pdf`, true);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recibo_${ventaActual.substring(0,8)}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        notify.success('PDF descargado correctamente');
    } catch (err) {
        console.error('[PDF] Error:', err);
        notify.error('Error al descargar el PDF');
    }
}

async function reenviarCorreoRecibo() {
    if (!ventaActual) {
        notify.warning('No hay recibo seleccionado');
        return;
    }
    try {
        const res = await API.post(`/libreria/ventas/${ventaActual}/reenviar-correo`, {}, true);
        if (res.ok) {
            notify.success('Correo reenviado correctamente');
        } else {
            const data = await res.json();
            notify.error('Error: ' + (data.detail || 'No se pudo reenviar el correo'));
        }
    } catch (err) {
        console.error('[Correo] Error:', err);
        notify.error('Error de conexión');
    }
}

// ======================== EXPORTAR CSV ========================
function exportarCSV() {
    if (ventasLista.length === 0) {
        notify.warning('No hay datos para exportar.');
        return;
    }

    let csv = 'Fecha,Hora,Cliente,Total,Estado\n';
    ventasLista.forEach(v => {
        csv += `${formatearFecha(v.fecha)},${formatearFechaHora(v.created_at)},${v.cliente || '—'},${v.total},${v.estado}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `ventas_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
}

// ======================== TOGGLE SIDEBAR ========================
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar-dinamico');
    if (sidebar) sidebar.classList.toggle('open');
    const overlay = document.getElementById('overlay');
    if (overlay) overlay.classList.toggle('hidden');
}

document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'index.html'; return; }
    mostrarUsuario();

    configurarFiltros();
    await cargarVendedores();

    document.getElementById('btnCerrarSesion').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'index.html';
    });

    await cargarReporte();
});
</script>
