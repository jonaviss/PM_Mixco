﻿<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras | PM Mixco ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#755b00",
                        "primary-container": "#C9A227",
                        "on-primary": "#ffffff",
                        "surface": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#F1F5F9",
                        "surface-container": "#E2E8F0",
                        "surface-container-high": "#CBD5E1",
                        "outline-variant": "#CBD5E1",
                        "outline": "#94A3B8",
                        "on-surface": "#1E293B",
                        "on-surface-variant": "#475569",
                        "secondary": "#64748B",
                        "error": "#EF4444"
                    },
                    fontFamily: { "sora": ["Sora"], "mono": ["JetBrains Mono"] },
                    spacing: { "sidebar": "260px" }
                }
            }
        }
    </script>
</head>
<body class="text-on-surface">

<div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<div id="main-content" class="md:ml-sidebar min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 bg-surface-container-lowest border-b border-outline-variant h-16 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-surface-container text-secondary">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <div>
                <h2 class="text-base font-bold text-on-surface leading-none">Mis Compras</h2>
                <p class="text-xs text-secondary mt-0.5">Portal del Cliente</p>
            </div>
        </div>
        <div class="flex items-center gap-2 pl-3 border-l border-outline-variant">
            <div class="text-right hidden sm:block">
                <p id="nombre-usuario" class="text-sm font-bold text-on-surface leading-none"></p>
                <p id="rango-usuario" class="text-xs text-secondary mt-0.5 capitalize"></p>
            </div>
            <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-white font-bold text-sm">
                <span id="avatar-inicial">?</span>
            </div>
        </div>
    </header>

    <main class="flex-1 p-6 space-y-6">

        <!-- KPIs -->
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-secondary uppercase tracking-wider mb-2">Total Compras</p>
                <p id="metrica-compras" class="text-2xl font-bold text-on-surface font-mono mt-1">—</p>
                <p id="metrica-compras-cantidad" class="text-xs text-secondary mt-1">— transacciones</p>
            </div>
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-secondary uppercase tracking-wider mb-2">Total Pagado</p>
                <p id="metrica-pagado" class="text-2xl font-bold text-on-surface font-mono mt-1">—</p>
                <p class="text-xs text-secondary mt-1">Pagos completados</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 shadow-sm">
                <p class="text-xs font-mono font-bold text-red-500 uppercase tracking-wider mb-2">Deuda Pendiente</p>
                <p id="metrica-deuda" class="text-2xl font-bold text-error font-mono mt-1">—</p>
                <p id="metrica-deuda-cantidad" class="text-xs text-error mt-1 font-bold">— ventas pendientes</p>
            </div>
        </section>

        <!-- Tabla de compras -->
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm">
            <div class="px-5 py-4 border-b border-outline-variant flex justify-between items-center bg-surface-container-low/30">
                <h3 class="text-sm font-bold text-on-surface">Historial de Compras</h3>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="filtrarHistorial('todos')" id="filtro-todos" class="text-xs font-mono px-3 py-1.5 bg-primary-container text-white rounded-lg transition">Todos</button>
                    <button onclick="filtrarHistorial('pagado')" id="filtro-pagado" class="text-xs font-mono px-3 py-1.5 border border-outline-variant rounded-lg hover:bg-surface-container transition text-secondary">Pagados</button>
                    <button onclick="filtrarHistorial('pendiente')" id="filtro-pendiente" class="text-xs font-mono px-3 py-1.5 border border-outline-variant rounded-lg hover:bg-surface-container transition text-secondary">Pendientes</button>
                    <button onclick="filtrarHistorial('cancelada')" id="filtro-cancelada" class="text-xs font-mono px-3 py-1.5 border border-outline-variant rounded-lg hover:bg-surface-container transition text-secondary">Canceladas</button>
                </div>
            </div>
            <!-- Vista tabla (escritorio) -->
            <div class="overflow-x-auto hidden md:block">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low/50">
                        <tr>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider">Fecha / Hora</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider">Operador</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-right">Total Venta</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-right">Total Pagado</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-center">Estado</th>
                            <th class="px-5 py-3 text-xs font-mono font-bold text-secondary uppercase tracking-wider text-center">Recibo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-historial" class="divide-y divide-outline-variant text-sm"></tbody>
                </table>
            </div>
            <!-- Vista cards (móvil) -->
            <div class="block md:hidden space-y-2 p-2" id="cards-historial"></div>
            <div class="px-5 py-3 border-t border-outline-variant bg-surface-container-low/30 flex flex-col sm:flex-row justify-between items-center gap-2">
                <p id="info-historial" class="text-xs font-mono text-secondary">— transacciones</p>
                <div class="flex items-center gap-2" id="paginacion">
                    <button id="btn-prev" onclick="paginaAnterior()" class="text-xs font-mono px-3 py-1.5 border border-outline-variant rounded-lg hover:bg-surface-container transition text-secondary disabled:opacity-40 disabled:cursor-not-allowed" disabled>Anterior</button>
                    <span id="info-pagina" class="text-xs font-mono text-secondary">Pág. 1</span>
                    <button id="btn-next" onclick="paginaSiguiente()" class="text-xs font-mono px-3 py-1.5 border border-outline-variant rounded-lg hover:bg-surface-container transition text-secondary disabled:opacity-40 disabled:cursor-not-allowed" disabled>Siguiente</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="border-t border-outline-variant px-6 py-3 text-center">
        
    </footer>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/libreria_shared.js"></script>
<script src="js/notify.js"></script>
<script src="js/layout.js"></script>

<script>
let historialCompleto = [];
let filtroActivo = 'todos';
let paginaActual = 1;
const POR_PAGINA = 10;

function cerrarSesion() {
    Auth.cerrarSesion();
}

// Sobrescribir inyectarModalRecibo para clientes (sin botón de enviar correo)
function inyectarModalRecibo() {
    if (document.getElementById('modal-recibo')) return;
    const modal = document.createElement('div');
    modal.id = 'modal-recibo';
    modal.className = 'fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm';
    modal.innerHTML = `
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col mx-2">
            <div class="bg-primary px-4 md:px-5 py-4 flex justify-between items-center flex-shrink-0">
                <div>
                    <h3 class="text-base font-bold text-white">Detalle del Recibo</h3>
                    <p id="modal-recibo-id" class="text-xs text-white/70 mt-0.5">Venta: —</p>
                </div>
                <button onclick="cerrarModalRecibo()" class="text-white/70 hover:text-white"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="overflow-y-auto flex-1 p-4 md:p-5 space-y-3 md:space-y-4">
                <div id="recibo-contenido">
                    <div class="text-center py-10 text-secondary">Cargando...</div>
                </div>
            </div>
            <div class="px-4 md:px-5 py-3 border-t border-outline-variant bg-surface-container-low/30 flex justify-between items-center flex-shrink-0 gap-2">
                <button onclick="descargarPDFRecibo()" class="px-3 md:px-4 py-2 text-xs md:text-sm font-bold bg-primary-container text-white rounded-lg hover:opacity-90 transition flex items-center gap-1 whitespace-nowrap">
                    <span class="material-symbols-outlined text-[16px] md:text-[18px]">download</span> <span class="hidden xs:inline">Descargar</span> PDF
                </button>
                <button onclick="cerrarModalRecibo()" class="px-3 md:px-4 py-2 text-xs md:text-sm font-bold text-secondary hover:bg-surface-container rounded-lg transition">Cerrar</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

// ================ RECIBO (endpoints cliente) ================
async function verRecibo(ventaId) {
    ventaActualRecibo = ventaId;
    inyectarModalRecibo();
    document.getElementById('modal-recibo-id').textContent = `Venta: ${ventaId.substring(0,8)}...`;
    document.getElementById('recibo-contenido').innerHTML = '<div class="text-center py-10 text-secondary">Cargando detalle...</div>';
    document.getElementById('modal-recibo').classList.remove('hidden');
    document.getElementById('modal-recibo').classList.add('flex');
    try {
        const res = await API.get(`/cliente/ventas/${ventaId}/detalle`, true);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderizarRecibo(data);
    } catch (err) {
        console.error('[Recibo] Error:', err);
        document.getElementById('recibo-contenido').innerHTML = `<div class="text-center py-10 text-error">Error al cargar el recibo.</div>`;
        if (window.notify) notify.error('Error al cargar el detalle');
    }
}

function renderizarRecibo(data) {
    const venta = data.venta;
    const productos = data.productos || [];
    const pagos = data.pagos || [];
    let html = `
        <div class="grid grid-cols-2 gap-2 md:gap-4 mb-4">
            <div class="bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-200 overflow-hidden">
                <p class="text-[10px] md:text-xs font-mono text-gray-500">Total Venta</p>
                <p class="text-xs md:text-lg font-bold font-mono truncate">${formatearMoneda(venta.total_venta)}</p>
            </div>
            <div class="bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-200 overflow-hidden">
                <p class="text-[10px] md:text-xs font-mono text-gray-500">Total Pagado</p>
                <p class="text-xs md:text-lg font-bold font-mono truncate">${formatearMoneda(venta.total_pagado)}</p>
            </div>
            <div class="bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-200 overflow-hidden">
                <p class="text-[10px] md:text-xs font-mono text-gray-500">Estado</p>
                <p class="text-xs md:text-lg font-bold truncate ${venta.estado_pago === 'pagado' ? 'text-green-600' : 'text-red-600'}">${venta.estado_pago.toUpperCase()}</p>
            </div>
            <div class="bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-200 overflow-hidden">
                <p class="text-[10px] md:text-xs font-mono text-gray-500">Operador</p>
                <p class="text-xs md:text-lg font-bold truncate">${escapeHtml(venta.operador || '—')}</p>
            </div>
        </div>
        <div class="mb-4">
            <p class="text-[10px] md:text-xs font-mono text-gray-500">Cliente</p>
            <p class="text-xs md:text-base font-bold truncate">${escapeHtml(venta.cliente || venta.comprador_cui)}</p>
        </div>
        <div class="mb-4">
            <h4 class="text-xs font-mono font-bold text-gray-500 uppercase tracking-wider mb-2">Productos</h4>
            <div class="border border-gray-200 rounded-xl overflow-hidden">
                <table class="w-full text-left hidden sm:table">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase">Producto</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-center">Cant.</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Precio</th>
                            <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
    `;
    if (productos.length === 0) {
        html += `<tr><td colspan="4" class="text-center py-4 text-gray-500">Sin productos.</td></tr>`;
    } else {
        productos.forEach(p => {
            html += `
                        <tr>
                            <td class="px-4 py-2.5">${escapeHtml(p.nombre)}</td>
                            <td class="px-4 py-2.5 text-center">${p.cantidad}</td>
                            <td class="px-4 py-2.5 text-right font-mono">${formatearMoneda(p.precio_unitario)}</td>
                            <td class="px-4 py-2.5 text-right font-mono font-bold">${formatearMoneda(p.subtotal)}</td>
                        </tr>
            `;
        });
    }
    html += `
                    </tbody>
                </table>
                <div class="sm:hidden divide-y divide-gray-100">
    `;
    if (productos.length === 0) {
        html += `<div class="text-center py-4 text-gray-500 text-sm">Sin productos.</div>`;
    } else {
        productos.forEach(p => {
            html += `
                    <div class="px-3 py-2.5">
                        <div class="text-xs font-bold mb-1 truncate">${escapeHtml(p.nombre)}</div>
                        <div class="flex gap-2 text-[11px] text-gray-500">
                            <span class="whitespace-nowrap"><span class="font-bold text-gray-700">${p.cantidad}</span> x ${formatearMoneda(p.precio_unitario)}</span>
                            <span class="ml-auto font-mono font-bold text-gray-700 whitespace-nowrap">${formatearMoneda(p.subtotal)}</span>
                        </div>
                    </div>
            `;
        });
    }
    html += `
                </div>
            </div>
        </div>
    `;
    if (pagos.length > 0) {
        html += `
            <div>
                <h4 class="text-xs font-mono font-bold text-gray-500 uppercase tracking-wider mb-2">Pagos</h4>
                <div class="border border-gray-200 rounded-xl overflow-hidden">
                    <table class="w-full text-left hidden sm:table">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase">Fecha</th>
                                <th class="px-4 py-2 text-xs font-mono font-bold text-gray-500 uppercase text-right">Monto</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
        `;
        pagos.forEach(p => {
            html += `
                        <tr>
                            <td class="px-4 py-2.5">${formatearFechaHora(p.fecha_pago)}</td>
                            <td class="px-4 py-2.5 text-right font-mono font-bold text-green-700">${formatearMoneda(p.monto_abonado)}</td>
                        </tr>
            `;
        });
        html += `
                        </tbody>
                    </table>
                    <div class="sm:hidden divide-y divide-gray-100">
        `;
        pagos.forEach(p => {
            html += `
                        <div class="flex justify-between items-center gap-2 px-3 py-2.5">
                            <span class="text-[11px] md:text-xs truncate">${formatearFechaHora(p.fecha_pago)}</span>
                            <span class="text-xs md:text-sm font-mono font-bold text-green-700 whitespace-nowrap flex-shrink-0">${formatearMoneda(p.monto_abonado)}</span>
                        </div>
            `;
        });
        html += `
                    </div>
                </div>
            </div>
        `;
    }
    document.getElementById('recibo-contenido').innerHTML = html;
}

function cerrarModalRecibo() {
    const modal = document.getElementById('modal-recibo');
    if (modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }
    ventaActualRecibo = null;
}

async function descargarPDFRecibo() {
    if (!ventaActualRecibo) {
        if (window.notify) notify.warning('No hay recibo seleccionado');
        return;
    }
    try {
        const res = await API.get(`/cliente/ventas/${ventaActualRecibo}/pdf`, true);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recibo_${ventaActualRecibo.substring(0,8)}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        if (window.notify) notify.success('PDF descargado correctamente');
    } catch (err) {
        console.error('[PDF] Error:', err);
        if (window.notify) notify.error('Error al descargar el PDF');
    }
}

// ================ PAGINACIÓN ================
function getPaginaActual() {
    const filtrados = filtrarDatos();
    const totalPaginas = Math.max(1, Math.ceil(filtrados.length / POR_PAGINA));
    if (paginaActual > totalPaginas) paginaActual = totalPaginas;
    const inicio = (paginaActual - 1) * POR_PAGINA;
    const fin = Math.min(inicio + POR_PAGINA, filtrados.length);
    return { datos: filtrados.slice(inicio, fin), total: filtrados.length, inicio, fin, totalPaginas };
}

function actualizarPaginacion() {
    const { total, inicio, fin, totalPaginas } = getPaginaActual();
    document.getElementById('info-historial').textContent = `${total} transacciones — Mostrando ${inicio + 1}-${fin}`;
    document.getElementById('info-pagina').textContent = `Pág. ${paginaActual} de ${totalPaginas}`;
    document.getElementById('btn-prev').disabled = paginaActual <= 1;
    document.getElementById('btn-next').disabled = paginaActual >= totalPaginas;
}

function paginaAnterior() {
    if (paginaActual > 1) { paginaActual--; renderizarPagina(); }
}

function paginaSiguiente() {
    const { totalPaginas } = getPaginaActual();
    if (paginaActual < totalPaginas) { paginaActual++; renderizarPagina(); }
}

// ================ FILTROS ================
function filtrarDatos() {
    if (filtroActivo === 'todos') return historialCompleto;
    if (filtroActivo === 'cancelada') return historialCompleto.filter(v => v.estado_pago === 'cancelada');
    if (filtroActivo === 'pendiente') return historialCompleto.filter(v => v.estado_pago !== 'pagado' && v.estado_pago !== 'cancelada');
    return historialCompleto.filter(v => v.estado_pago === 'pagado');
}

function filtrarHistorial(filtro) {
    filtroActivo = filtro;
    paginaActual = 1;
    ['todos', 'pagado', 'pendiente', 'cancelada'].forEach(f => {
        const btn = document.getElementById(`filtro-${f}`);
        const esActivo = f === filtro;
        btn.className = `text-xs font-mono px-3 py-1.5 rounded-lg transition ${esActivo ? 'bg-primary-container text-white' : 'border border-outline-variant hover:bg-surface-container text-secondary'}`;
    });
    renderizarPagina();
}

function renderizarPagina() {
    const { datos } = getPaginaActual();
    renderizarHistorial(datos);
    actualizarPaginacion();
}

function renderizarHistorial(ventas) {
    const tbody = document.getElementById('tabla-historial');
    const cards = document.getElementById('cards-historial');
    if (ventas.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-8 text-secondary text-sm">
                    <span class="material-symbols-outlined text-[28px] block mb-1 text-outline-variant">receipt_long</span>
                    No hay transacciones con ese filtro.
                </td>
            </tr>
        `;
        cards.innerHTML = '<div class="text-center py-8 text-secondary text-sm"><span class="material-symbols-outlined text-[28px] block mb-1 text-outline-variant">receipt_long</span>No hay transacciones con ese filtro.</div>';
        return;
    }
    tbody.innerHTML = '';
    cards.innerHTML = '';
    ventas.forEach(v => {
        const badge = v.estado_pago === 'cancelada' ?
            '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-gray-200 text-gray-600 line-through">Cancelada</span>' :
            (v.estado_pago === 'pagado' ?
                '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700">Pagado</span>' :
                (v.estado_pago === 'parcial' ?
                    '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">Parcial</span>' :
                    '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Pendiente</span>'));
        const fechaHora = v.created_at ?
            new Date(v.created_at).toLocaleString('es-GT', { timeZone: 'America/Guatemala', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';

        // Fila de tabla (escritorio)
        const tr = document.createElement('tr');
        tr.className = 'table-row transition-colors';
        tr.innerHTML = `
            <td class="px-5 py-3 text-sm">${fechaHora}</td>
            <td class="px-5 py-3 text-sm text-secondary">${v.nombre_operador || '—'}</td>
            <td class="px-5 py-3 text-sm font-mono font-bold text-right">${formatearMoneda(v.total_venta)}</td>
            <td class="px-5 py-3 text-sm font-mono text-right">${formatearMoneda(v.total_pagado)}</td>
            <td class="px-5 py-3 text-center">${badge}</td>
            <td class="px-5 py-3 text-center">
                <button onclick="verRecibo('${v.id}')" class="p-1.5 rounded-lg border border-outline-variant text-primary hover:bg-primary-container hover:text-white transition" title="Ver recibo">
                    <span class="material-symbols-outlined text-[16px]">receipt_long</span>
                </button>
            </td>
        `;
        tbody.appendChild(tr);

        // Card (móvil)
        const card = document.createElement('div');
        card.className = 'bg-white border border-outline-variant rounded-xl p-3 shadow-sm overflow-hidden';
        card.innerHTML = `
            <div class="flex items-center justify-between gap-1 mb-1.5">
                <span class="text-[10px] text-secondary font-mono truncate min-w-0">${fechaHora}</span>
                <div class="flex-shrink-0">${badge.replace('text-xs', 'text-[10px]')}</div>
            </div>
            <div class="flex items-center justify-between gap-1">
                <span class="text-[10px] text-secondary truncate min-w-0">${v.nombre_operador || '—'}</span>
                <span class="text-xs font-bold font-mono whitespace-nowrap flex-shrink-0">${formatearMoneda(v.total_venta)}</span>
            </div>
            <div class="flex items-center justify-between gap-1 mt-1.5 pt-1.5 border-t border-outline-variant/50">
                <span class="text-[10px] text-secondary truncate min-w-0">Pagado <span class="font-bold font-mono text-green-600">${formatearMoneda(v.total_pagado)}</span></span>
                <button onclick="verRecibo('${v.id}')" class="text-[10px] font-mono px-2 py-1 bg-primary-container text-white rounded-lg hover:opacity-90 transition flex items-center gap-1 whitespace-nowrap flex-shrink-0">
                    <span class="material-symbols-outlined text-[12px]">receipt_long</span> Recibo
                </button>
            </div>
        `;
        cards.appendChild(card);
    });
}

// ================ INICIALIZACIÓN ================
document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'index.html'; return; }
    mostrarUsuario();
    try {
        const res = await API.get('/cliente/compras', true);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        historialCompleto = data.ventas || [];
        for (const v of historialCompleto) {
            if (v.digitado_por) {
                v.nombre_operador = v.digitado_por;
            }
        }
        const activas = historialCompleto.filter(v => v.estado_pago !== 'cancelada');
        const totalCompras = activas.reduce((acc, v) => acc + v.total_venta, 0);
        const totalPagado = activas.reduce((acc, v) => acc + v.total_pagado, 0);
        const totalDeuda = totalCompras - totalPagado;
        const ventasPendientes = activas.filter(v => v.estado_pago !== 'pagado').length;
        document.getElementById('metrica-compras').textContent = formatearMoneda(totalCompras);
        document.getElementById('metrica-compras-cantidad').textContent = `${historialCompleto.length} transacciones`;
        document.getElementById('metrica-pagado').textContent = formatearMoneda(totalPagado);
        document.getElementById('metrica-deuda').textContent = formatearMoneda(totalDeuda);
        document.getElementById('metrica-deuda-cantidad').textContent = `${ventasPendientes} ventas pendientes`;
        filtrarHistorial('todos');
    } catch (err) {
        console.error('[Cliente] Error:', err);
        notify.error('Error al cargar tus compras');
        document.getElementById('tabla-historial').innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-8 text-secondary text-sm">
                    <span class="material-symbols-outlined text-[28px] block mb-1 text-error">error</span>
                    Error al cargar los datos. Intenta de nuevo más tarde.
                </td>
            </tr>`;
        document.getElementById('cards-historial').innerHTML = '<div class="text-center py-8 text-secondary text-sm p-4"><span class="material-symbols-outlined text-[28px] block mb-1 text-error">error</span>Error al cargar los datos. Intenta de nuevo más tarde.</div>';
    }
});
</script>
