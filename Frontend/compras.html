<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Compra | PM Mixco ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#755b00",
                        "primary-container": "#C9A227",
                        "on-primary": "#ffffff",
                        "surface": "#F8FAFC",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#F1F5F9",
                        "surface-container": "#E2E8F0",
                        "surface-container-high": "#CBD5E1",
                        "outline-variant": "#CBD5E1",
                        "outline": "#94A3B8",
                        "on-surface": "#1E293B",
                        "on-surface-variant": "#475569",
                        "secondary": "#64748B",
                        "error": "#EF4444"
                    },
                    fontFamily: { "sora": ["Sora"], "mono": ["JetBrains Mono"] },
                    spacing: { "sidebar": "260px" }
                }
            }
        }
    </script>
    <style>
        .tabla-productos-container {
            overflow-x: auto;
            overflow-y: visible;
            max-height: none;
        }
        .tabla-productos-container table {
            width: 100%;
            border-collapse: collapse;
            display: table;
        }
        .tabla-productos-container tbody {
            display: table-row-group;
        }
        .tabla-productos-container tr {
            display: table-row;
        }
    </style>
</head>
<body class="text-on-surface">

<div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<!-- El sidebar se inyecta dinámicamente mediante layout.js -->

<div id="main-content" class="md:ml-sidebar min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 bg-surface-container-lowest border-b border-outline-variant h-16 flex items-center justify-between px-6 shadow-sm">
        <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-surface-container text-secondary"><span class="material-symbols-outlined">menu</span></button>
        <h2 class="text-base font-bold text-on-surface leading-none">Registrar Compra</h2>
        <div class="flex items-center gap-2 pl-3 border-l border-outline-variant">
            <div class="text-right hidden sm:block"><p id="nombre-usuario" class="text-sm font-bold text-on-surface"></p><p id="rango-usuario" class="text-xs text-secondary mt-0.5 capitalize"></p></div>
            <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-white font-bold text-sm"><span id="avatar-inicial">?</span></div>
        </div>
    </header>

    <main class="flex-1 p-6 space-y-6">
        <div class="bg-white border border-outline-variant rounded-xl p-6 shadow-sm">
            <h3 class="text-sm font-bold text-on-surface mb-4">Datos de la Compra</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Proveedor *</label><select id="proveedor-id" class="w-full border rounded-lg px-3 py-2"></select></div>
                <div><label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Fecha Compra (recibido) *</label><input type="date" id="fecha-compra" class="w-full border rounded-lg px-3 py-2"></div>
                <div><label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Fecha Factura</label><input type="date" id="fecha-factura" class="w-full border rounded-lg px-3 py-2"></div>
                <div><label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Factura (Número)</label><input type="text" id="factura" class="w-full border rounded-lg px-3 py-2"></div>
                <div class="md:col-span-2"><label class="block text-xs font-mono font-bold text-secondary uppercase mb-1">Observaciones</label><textarea id="observaciones" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea></div>
            </div>
            <h3 class="text-sm font-bold text-on-surface mb-2">Productos</h3>
            <div class="tabla-productos-container">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-low/50">
                        <tr>
                            <th class="px-3 py-2">Producto <span class="text-error">*</span></th>
                            <th class="px-3 py-2">Cantidad <span class="text-error">*</span></th>
                            <th class="px-3 py-2">Costo Unitario (Q) <span class="text-error">*</span></th>
                            <th class="px-3 py-2">Subtotal</th>
                            <th class="px-3 py-2"></th>
                        </tr>
                    </thead>
                    <tbody id="detalles-body"></tbody>
                </table>
            </div>
            <button type="button" onclick="agregarProducto()" class="text-sm text-primary-container border border-primary-container rounded-lg px-3 py-1 hover:bg-primary-container hover:text-white transition">+ Agregar producto</button>
            <div class="mt-4 text-right"><span class="font-bold">Total Compra: </span><span id="total-compra" class="font-mono font-bold text-primary">Q0.00</span></div>
            <div class="flex justify-end gap-3 mt-6"><button onclick="registrarCompra()" class="bg-primary-container text-white font-bold px-6 py-2 rounded-lg hover:opacity-90">Registrar Compra</button></div>
        </div>
    </main>
</div>

<!-- MODAL PARA CREAR PRODUCTO RÁPIDO -->
<div id="modal-nuevo-producto" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-primary px-5 py-4 flex justify-between items-center">
            <h3 class="text-base font-bold text-white">Nuevo Producto</h3>
            <button onclick="cerrarModalProducto()" class="text-white/70 hover:text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-5 space-y-4">
            <div><label class="block text-xs font-bold text-secondary uppercase mb-1">Nombre *</label><input type="text" id="nuevo-nombre" class="w-full border rounded-lg px-3 py-2"></div>
            <div><label class="block text-xs font-bold text-secondary uppercase mb-1">Categoría *</label><select id="nuevo-tipo" class="w-full border rounded-lg px-3 py-2"><option value="Biblia">Biblia</option><option value="Libro">Libro</option><option value="Material">Material de Estudio</option><option value="Accesorio">Accesorio</option></select></div>
            <div class="bg-amber-50 p-2 rounded text-xs text-amber-800">El producto se asignará al proveedor seleccionado en la compra.</div>
            <div><label class="block text-xs font-bold text-secondary uppercase mb-1">Precio de Venta (Q) *</label><input type="number" id="nuevo-precio" step="0.01" min="0.01" class="w-full border rounded-lg px-3 py-2"></div>
            <div><label class="block text-xs font-bold text-secondary uppercase mb-1">Descripción</label><input type="text" id="nuevo-descripcion" class="w-full border rounded-lg px-3 py-2"></div>
        </div>
        <div class="bg-surface-container-low px-5 py-4 border-t flex justify-end gap-3">
            <button onclick="cerrarModalProducto()" class="px-4 py-2 text-sm font-bold text-secondary">Cancelar</button>
            <button onclick="guardarProductoRapido()" class="px-4 py-2 text-sm font-bold bg-primary-container text-white rounded-lg">Guardar Producto</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/notify.js"></script>
<script src="js/layout.js"></script>
<script>
    let proveedores = [];
    let productosCatalogo = [];
    let detalles = [];
    let filaEnEdicion = null;

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar-dinamico');
        if (sidebar) sidebar.classList.toggle('open');
        const overlay = document.getElementById('overlay');
        if (overlay) overlay.classList.toggle('hidden');
    }

    function scrollAlFinal() {
        const tbody = document.getElementById('detalles-body');
        if (tbody && tbody.lastElementChild) {
            tbody.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function mostrarUsuario(){ 
        const n=localStorage.getItem('usuario')||'Usuario'; 
        document.getElementById('nombre-usuario').textContent=n; 
        document.getElementById('rango-usuario').textContent=localStorage.getItem('rango')||''; 
        document.getElementById('avatar-inicial').textContent=n.charAt(0).toUpperCase(); 
    }

    async function cargarProveedores(){ 
        try{ 
            const res = await API.get('/libreria/compras/proveedores?estado=activos', true); 
            if(res.ok) { 
                proveedores = await res.json(); 
                const sel = document.getElementById('proveedor-id'); 
                sel.innerHTML = '<option value="">Seleccione</option>'; 
                proveedores.forEach(p => { sel.innerHTML += `<option value="${p.id}">${p.nombre}</option>`; });
            } 
        } catch(e){ console.error(e); notify.error('Error al cargar proveedores'); } 
    }

    async function cargarProductosCatalogo(){ 
        try{ 
            const res = await API.get('/libreria/productos?incluir_inactivos=true', true); 
            if(res.ok) productosCatalogo = await res.json(); 
        } catch(e){ console.error(e); notify.error('Error al cargar productos'); } 
    }

    function agregarProducto(){ 
        const tbody = document.getElementById('detalles-body'); 
        const idx = detalles.length; 
        const div = document.createElement('tr'); 
        div.id = `detalle-${idx}`; 
        div.innerHTML = `
            <td class="px-3 py-2">
                <div class="flex items-center gap-1">
                    <select id="producto-${idx}" class="w-full border rounded px-2 py-1" onchange="actualizarSubtotal(${idx})">
                        <option value="">Seleccione</option>
                        ${productosCatalogo.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
                    </select>
                    <button type="button" onclick="abrirModalProducto(${idx})" class="p-1 text-primary hover:text-primary-container" title="Crear nuevo producto">
                        <span class="material-symbols-outlined text-[18px]">add_circle</span>
                    </button>
                </div>
            <\/td>
            <td class="px-3 py-2"><input type="number" id="cantidad-${idx}" value="1" min="1" class="w-24 border rounded px-2 py-1" onchange="actualizarSubtotal(${idx})"><\/td>
            <td class="px-3 py-2"><input type="number" id="costo-${idx}" step="0.01" min="0" class="w-32 border rounded px-2 py-1" placeholder="0.00" onchange="actualizarSubtotal(${idx})"><\/td>
            <td class="px-3 py-2"><span id="subtotal-${idx}" class="font-mono">Q0.00<\/span><\/td>
            <td class="px-3 py-2"><button onclick="eliminarDetalle(${idx})" class="text-error"><span class="material-symbols-outlined text-[18px]">delete<\/span><\/button><\/td>
        `;
        tbody.appendChild(div);
        detalles.push({ idx, producto_id: null, cantidad: 1, costo: null });
        actualizarTotal();
        scrollAlFinal();
    }

    function actualizarSubtotal(idx){ 
        const prodSel = document.getElementById(`producto-${idx}`); 
        const cantidad = parseFloat(document.getElementById(`cantidad-${idx}`).value) || 0; 
        const costoInput = document.getElementById(`costo-${idx}`).value;
        let costo = parseFloat(costoInput);
        if (isNaN(costo)) costo = null;
        const subtotal = (cantidad && costo) ? cantidad * costo : 0;
        document.getElementById(`subtotal-${idx}`).innerText = formatearMoneda(subtotal); 
        detalles[idx] = { idx, producto_id: prodSel.value, cantidad: cantidad, costo: costo }; 
        actualizarTotal(); 
    }

    function eliminarDetalle(idx){ 
        const row = document.getElementById(`detalle-${idx}`); 
        if(row) row.remove(); 
        detalles = detalles.filter(d => d.idx !== idx); 
        actualizarTotal(); 
    }

    function actualizarTotal(){ 
        let total = 0; 
        detalles.forEach(d => { 
            if (d.cantidad && d.costo) total += d.cantidad * d.costo; 
        }); 
        document.getElementById('total-compra').innerText = formatearMoneda(total); 
    }

    function formatearMoneda(val){ 
        return 'Q' + parseFloat(val||0).toLocaleString('es-GT', { minimumFractionDigits: 2 }); 
    }

    function abrirModalProducto(idx) {
        filaEnEdicion = idx;
        const proveedorId = document.getElementById('proveedor-id').value;
        if (!proveedorId) {
            notify.warning('Primero debe seleccionar un proveedor en la compra antes de crear un producto.');
            return;
        }
        document.getElementById('nuevo-nombre').value = '';
        document.getElementById('nuevo-tipo').value = 'Biblia';
        document.getElementById('nuevo-precio').value = '';
        document.getElementById('nuevo-descripcion').value = '';
        document.getElementById('modal-nuevo-producto').classList.remove('hidden');
        document.getElementById('modal-nuevo-producto').classList.add('flex');
    }

    function cerrarModalProducto() {
        document.getElementById('modal-nuevo-producto').classList.add('hidden');
        filaEnEdicion = null;
    }

    async function guardarProductoRapido() {
        const nombre = document.getElementById('nuevo-nombre').value.trim();
        const tipo = document.getElementById('nuevo-tipo').value;
        const precio = parseFloat(document.getElementById('nuevo-precio').value);
        const descripcion = document.getElementById('nuevo-descripcion').value.trim() || null;
        const proveedor_id = document.getElementById('proveedor-id').value;

        if (!nombre) {
            notify.error('El nombre del producto es obligatorio.');
            return;
        }
        if (isNaN(precio) || precio <= 0) {
            notify.error('Ingrese un precio de venta válido (mayor a Q0.00).');
            return;
        }
        if (!proveedor_id) {
            notify.warning('No hay proveedor seleccionado en la compra. Asigne un proveedor primero.');
            return;
        }

        const payload = {
            tipo_producto: tipo,
            nombre: nombre,
            descripcion: descripcion,
            precio: precio,
            stock: 0,
            estado: true,
            atributos_especificos: {},
            proveedor_id: proveedor_id
        };

        try {
            const res = await API.post('/libreria/productos', payload, true);
            if (res.ok) {
                const data = await res.json();
                await cargarProductosCatalogo();
                for (let i = 0; i < detalles.length; i++) {
                    const select = document.getElementById(`producto-${i}`);
                    if (select) {
                        const oldValue = select.value;
                        select.innerHTML = '<option value="">Seleccione</option>' + productosCatalogo.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
                        if (oldValue) select.value = oldValue;
                    }
                }
                const selectActual = document.getElementById(`producto-${filaEnEdicion}`);
                if (selectActual) {
                    selectActual.value = data.data.id;
                    actualizarSubtotal(filaEnEdicion);
                }
                cerrarModalProducto();
                notify.success('Producto creado exitosamente y seleccionado.');
            } else {
                const err = await res.json();
                notify.error('Error al crear producto: ' + (err.detail || 'Error desconocido'));
            }
        } catch (error) {
            console.error(error);
            notify.error('Error de conexión al crear producto.');
        }
    }

    async function registrarCompra(){ 
        const proveedor_id = document.getElementById('proveedor-id').value; 
        if(!proveedor_id){ notify.warning('Seleccione proveedor'); return; } 
        if(detalles.length === 0){ notify.warning('Agregue al menos un producto'); return; } 
        
        let valido = true;
        for (let i = 0; i < detalles.length; i++) {
            const d = detalles[i];
            if (!d.producto_id) {
                notify.warning(`Fila ${i+1}: debe seleccionar un producto.`);
                valido = false;
                break;
            }
            if (!d.cantidad || d.cantidad <= 0) {
                notify.warning(`Fila ${i+1}: la cantidad debe ser mayor a cero.`);
                valido = false;
                break;
            }
            if (d.costo === null || isNaN(d.costo) || d.costo < 0) {
                notify.warning(`Fila ${i+1}: debe ingresar un costo unitario mayor o igual a cero.`);
                valido = false;
                break;
            }
        }
        if (!valido) return;

        const payload = { 
            proveedor_id, 
            fecha_compra: document.getElementById('fecha-compra').value, 
            fecha_factura: document.getElementById('fecha-factura').value || null, 
            factura: document.getElementById('factura').value || null, 
            observaciones: document.getElementById('observaciones').value || null, 
            detalles: detalles.filter(d => d.producto_id && d.cantidad && d.costo !== null).map(d => ({ 
                producto_id: d.producto_id, 
                cantidad: d.cantidad, 
                costo_unitario: d.costo 
            })) 
        }; 
        const btn = event.currentTarget;
        btn.disabled = true;
        btn.textContent = 'Registrando...';
        try{ 
            const res = await API.post('/libreria/compras', payload, true); 
            if(res.ok){ 
                notify.success('Compra registrada correctamente'); 
                setTimeout(() => location.reload(), 1500);
            } else { 
                const err = await res.json(); 
                notify.error('Error: ' + JSON.stringify(err)); 
            } 
        } catch(e){ 
            notify.error('Error de conexión'); 
        } finally {
            btn.disabled = false;
            btn.textContent = 'Registrar Compra';
        } 
    }

    document.addEventListener('DOMContentLoaded', async () => { 
        if(!localStorage.getItem('token')) window.location.href='index.html'; 
        mostrarUsuario(); 
        await cargarProveedores(); 
        await cargarProductosCatalogo(); 
        document.getElementById('fecha-compra').valueAsDate = new Date(); 
        agregarProducto();
    });
</script>

</body>
</html>
