<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Correo | PM Mixco ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <script>tailwind.config={theme:{extend:{colors:{"primary":"#755b00","primary-container":"#C9A227","surface-container-lowest":"#ffffff","surface-container-low":"#F1F5F9","outline-variant":"#CBD5E1","secondary":"#64748B","error":"#EF4444"},fontFamily:{"sora":["Sora"],"mono":["JetBrains Mono"]},spacing:{"sidebar":"260px"}}}}</script>
</head>
<body class="text-on-surface">
<div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>
<div id="main-content" class="md:ml-sidebar min-h-screen flex flex-col">
    <header class="sticky top-0 z-20 bg-surface-container-lowest border-b border-outline-variant h-16 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-surface-container text-secondary"><span class="material-symbols-outlined">menu</span></button>
            <a href="admin_configuracion.html" class="p-1.5 rounded-lg hover:bg-surface-container text-secondary" title="Regresar a Configuración"><span class="material-symbols-outlined">arrow_back</span></a>
            <div><h2 class="text-base font-bold text-on-surface leading-none">Configuración de Correo</h2><p class="text-xs text-secondary mt-0.5">Remitente para envío de comprobantes</p></div>
        </div>
        <div class="flex items-center gap-2 pl-3 border-l border-outline-variant">
            <div class="text-right hidden sm:block"><p id="nombre-usuario" class="text-sm font-bold text-on-surface leading-none"></p><p id="rango-usuario" class="text-xs text-secondary mt-0.5 capitalize"></p></div>
            <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-white font-bold text-sm"><span id="avatar-inicial">?</span></div>
        </div>
    </header>
    <main class="flex-1 p-6 space-y-6">
        <section class="max-w-xl mx-auto bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-sm space-y-5">
            <div>
                <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">Correo remitente</label>
                <input type="email" id="field-user" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary-container transition" placeholder="ejemplo@gmail.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-secondary uppercase tracking-wider mb-1">Contraseña de aplicación</label>
                <div class="relative">
                    <input type="password" id="field-pass" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary-container transition pr-10" placeholder="16 caracteres">
                    <button onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition">
                        <span class="material-symbols-outlined text-[18px]" id="pass-icon">visibility_off</span>
                    </button>
                </div>
                <p class="text-xs text-secondary mt-1">Contraseña de 16 letras generada desde Google (<a href="https://myaccount.google.com/apppasswords" target="_blank" class="text-primary underline">¿Cómo obtenerla?</a>)</p>
            </div>
            <div class="flex justify-end">
                <button id="btn-guardar" onclick="guardar()" class="px-6 py-2.5 text-sm font-bold text-white rounded-lg hover:opacity-90 transition" style="background-color:#C9A227;">Guardar configuración</button>
            </div>
        </section>
    </main>
    <footer class="border-t border-outline-variant px-6 py-3 text-center"><p class="text-xs font-mono text-outline">PM Mixco ERP v2.0.0 &mdash; Configuración de Correo &copy; 2026</p></footer>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/notify.js"></script>
<script src="js/layout.js"></script>
<script>
function togglePass(){const p=document.getElementById('field-pass'),i=document.getElementById('pass-icon');if(p.type==='password'){p.type='text';i.textContent='visibility'}else{p.type='password';i.textContent='visibility_off'}}
async function cargarConfig(){try{const r=await API.get('/configuracion/correo',!0);if(!r.ok)return;const d=await r.json();if(d.smtp_user)document.getElementById('field-user').value=d.smtp_user}catch(e){console.error(e)}}
async function guardar(){const user=document.getElementById('field-user').value.trim(),pass=document.getElementById('field-pass').value.trim();if(!user||!pass){notify.warning('Completa ambos campos');return}
const btn=document.getElementById('btn-guardar');btn.disabled=!0;btn.textContent='Guardando...'
try{const r=await API.put('/configuracion/correo',{smtp_user:user,smtp_password:pass},!0);if(r.ok){notify.success('Configuración guardada')}else{const d=await r.json();notify.error(API.mensajeError(d))}}catch(e){notify.error('Error de conexión')}finally{btn.disabled=!1;btn.textContent='Guardar configuración'}}
document.addEventListener('DOMContentLoaded',async()=>{if(!localStorage.getItem('token')){window.location.href='index.html';return};mostrarUsuario();await cargarConfig()});
</script>
</body>
</html>
